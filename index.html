<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tube</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #ff9729;
            text-align: center;
            margin: 0;
            padding: 0;
            font-weight: 400;
            line-height: 1.5;
            font-size: 1.4em;
        }

        .station-name {
            font-weight: bold;
        }

        .time-left {
            color: red;
        }

        #arrivals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 0;
            margin: 0;
        }

        .platform-section {
            padding: 10px;
            border-radius: 10px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        h3 {
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            color: white;
        }

        .arrival-time {
            padding: 10px;
            background-color: #000;
            border-bottom: 1px solid #555;
            margin: 5px 0;
            letter-spacing: 1px;
            text-align: left;
        }

        .arrival-time p {
            font-weight: bold;
            margin: 5px 0;
            line-height: 1.5;
            padding: 10px;
            background-color: #000;
            margin: 5px 0;
            letter-spacing: 1px;
            text-align: left;
        }

        .live-location {
            font-weight: light;
            color: green;
        }

        .departure {
            display: flex;
            justify-content: space-between;
        }

        .departure p {
            margin: 0;
            padding: 0;
        }

        .journeyContainer {
            display: flex;
        }

        .journey {
            padding: 10px;
            text-align: left;
            font-size: 1em;
        }

        @media (max-width: 900px) {
            .journeyContainer {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            #arrivals {
                grid-template-columns: 1fr;
            }

            .journeyContainer {
                display: grid;
                grid-template-columns: 1fr;
            }
        }

        /* Cog panel */
        .cache-btn {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 7px 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #ff9729;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
            box-sizing: border-box;
        }

        .cache-btn:active {
            background: #333;
        }

        #cacheStatus {
            margin-top: 6px;
            font-size: 0.9em;
            color: #0f0;
            min-height: 1.2em;
            text-align: left;
        }
    </style>
</head>

<body>
    <button onclick="location.reload()"
        style="position:absolute;background: #1a1a1a;color: #ff9729;border: 1px solid #444;padding: 8px 15px;border-radius: 5px;font-family: 'Courier New', Courier, monospace;font-size: 0.6em;cursor: pointer;left: 0;top: 0;">
        🔄
    </button>

    <div>
        <span id="clock" style="color: red; font-weight:bold; position: fixed; right: 0; top:0;"></span>
    </div>
    <span class="station-name">Stepney Green Live</span>
    <div id="arrivals"></div>
    <h3>Marriot Tube + Bus Live</h3>
    <div class="journeyContainer" id="journeyContainer1"></div>

    <h3>Marriot 5am Tube only</h3>
    <div class="journeyContainer" id="journeyContainer"></div>

    <h3>Marriot 5am Bus only</h3>
    <div class="journeyContainer" id="journeyContainer2"></div>

    <script>
        function xmlToJson(xml) {
            var obj = {};
            if (xml.nodeType == 1) {
                if (xml.attributes.length > 0) {
                    obj["@attributes"] = {};
                    for (var j = 0; j < xml.attributes.length; j++) {
                        var attribute = xml.attributes.item(j);
                        obj["@attributes"][attribute.nodeName] = attribute.nodeValue;
                    }
                }
            } else if (xml.nodeType == 3) {
                obj = xml.nodeValue;
            }
            var textNodes = [].slice.call(xml.childNodes).filter(function (node) {
                return node.nodeType === 3;
            });
            if (xml.hasChildNodes() && xml.childNodes.length === textNodes.length) {
                obj = [].slice.call(xml.childNodes).reduce(function (text, node) {
                    return text + node.nodeValue;
                }, "");
            } else if (xml.hasChildNodes()) {
                for (var i = 0; i < xml.childNodes.length; i++) {
                    var item = xml.childNodes.item(i);
                    var nodeName = item.nodeName;
                    if (typeof obj[nodeName] == "undefined") {
                        obj[nodeName] = xmlToJson(item);
                    } else {
                        if (typeof obj[nodeName].push == "undefined") {
                            var old = obj[nodeName];
                            obj[nodeName] = [];
                            obj[nodeName].push(old);
                        }
                        obj[nodeName].push(xmlToJson(item));
                    }
                }
            }
            return obj;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        function fetchArrivals() {
            fetch('https://api.tfl.gov.uk/trackernet/PredictionDetailed/H/STG?app_key=f6de10a6e45f4c55b9e4de791bbc60c0')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.text();
                })
                .then(xmlString => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                    updateArrivals(xmlToJson(xmlDoc));
                })
                .catch(error => {
                    arrivals.innerHTML = "<h2 style='color: red;'>Error fetching tube data</h2>";
                    console.error('Error fetching data:', error);
                });
        }

        function updateArrivals(data) {
            const arrivalsContainer = document.getElementById('arrivals');
            arrivalsContainer.innerHTML = '';
            const platforms = {};

            data.ROOT.S.P.forEach(item0 => {
                if (item0.T.length > 0) {
                    platforms[item0['@attributes'].N] = item0.T ?? [];
                }
            });

            const sortedPlatforms = Object.keys(platforms).sort((a, b) => a - b);

            sortedPlatforms.forEach(platform => {
                const platformSection = document.createElement('div');
                platformSection.classList.add('platform-section');

                const platformHeader = document.createElement('h3');
                platformHeader.textContent = platform;
                platformSection.appendChild(platformHeader);

                platforms[platform].forEach((item1, i) => {
                    if (i > 4) return;
                    const arrivalDiv = document.createElement('div');
                    arrivalDiv.classList.add('arrival-time');
                    const item = item1['@attributes'];

                    const destination = item.Destination?.replace("Underground Station", "") || 'Destination Unknown';
                    const currentLocation = item.Location || 'Location Unknown';
                    const timeToStation = Math.floor(item.SecondsTo / 60) || 0;
                    const isEmpty = (str) => (!str?.length);
                    var expectedArrival = "Unknown";

                    if (!isEmpty(item.ArrivalTime)) {
                        let [h, m, s] = item.ArrivalTime.split(":").map(Number);
                        let date = new Date(0, 0, 0, h, m, s);
                        date.setHours(date.getHours() + 1);
                        const pad = n => n.toString().padStart(2, "0");
                        expectedArrival = `${date.getHours()}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
                    }

                    arrivalDiv.innerHTML = `
                        <div class="departure">
                            <p class="destination"><span>${destination} (${item?.SetNo}) - ${expectedArrival}</span></p>
                            <p class="time-left"><span>${timeToStation} mins</span></p>
                        </div>
                        <div class="departure">
                            <p class="live-location">Live: <span>${currentLocation || 'N/A'}</span></p>
                        </div>
                    `;
                    platformSection.appendChild(arrivalDiv);
                });

                arrivalsContainer.appendChild(platformSection);
            });
        }

        fetchArrivals();
        setInterval(fetchArrivals, 20000);
    </script>

    <script>
        async function fetchJourneys(api, containerName) {
            const container = document.getElementById(containerName);
            try {
                const response = await fetch(api);
                const data = await response.json();
                displayJourneys(data.journeys, container);
            } catch (error) {
                console.error("Error fetching journey data:", error);
                container.innerHTML = "Failed to load journey data.";
            }
        }

        function displayJourneys(journeys, container) {
            container.innerHTML = "";
            if (!journeys || journeys.length === 0) {
                container.innerHTML = "No journeys available.";
                return;
            }
            journeys.forEach(journey => {
                const journeyDiv = document.createElement("div");
                journeyDiv.className = "journey";
                const startTime = new Date(journey.startDateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const arrivalTime = new Date(journey.arrivalDateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                journeyDiv.innerHTML = `
                    <p><strong>${startTime} - ${arrivalTime}</strong> <span class="time-left">(${journey.duration}')</span></p>
                    <div class="legs">
                        ${journey.legs.map((leg) => `
                            <p>• ${leg.instruction.summary} ${new Date(leg.departureTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} (${leg.duration}')</p>
                        `).join("")}
                    </div>
                `;
                container.appendChild(journeyDiv);
            });
        }

        const API_URL_now = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=bus,tube&walkingSpeed=fast&useRealTimeLiveArrivals=true";
        const API_URL_5AM_tube = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=tube&walkingSpeed=fast&useRealTimeLiveArrivals=true&time=0500&maxWalkingMinutes=20";
        const API_URL_5AM_Bus = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=tube,bus&walkingSpeed=fast&useRealTimeLiveArrivals=true&time=0500&maxWalkingMinutes=12";

        fetchJourneys(API_URL_5AM_tube, "journeyContainer");
        setInterval(() => fetchJourneys(API_URL_5AM_tube, "journeyContainer"), 120000);

        fetchJourneys(API_URL_5AM_Bus, "journeyContainer2");
        setInterval(() => fetchJourneys(API_URL_5AM_Bus, "journeyContainer2"), 120000);

        fetchJourneys(API_URL_now, "journeyContainer1");
        setInterval(() => fetchJourneys(API_URL_now, "journeyContainer1"), 20000);
    </script>

    <!-- Cog settings panel -->
    <div id="fontControls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999;">
        <button id="cogBtn"
            style="background:none; border:none; color:white; font-size:1.5em; cursor:pointer;">⚙️</button>
        <div id="sliderContainer"
            style="display:none; background:#111; padding:10px; border-radius:8px; margin-top:5px; color:white; font-size:0.4em; min-width: 200px;">
            <label for="fontSlider">Font Size:</label>
            <input type="range" id="fontSlider" min="0.8" max="6" step="0.1">
            <hr style="border:none; border-top:1px solid #333; margin: 10px 0;">
            <button class="cache-btn" id="recacheBtn">🔄 Re-cache page</button>
            <button class="cache-btn" id="clearCacheBtn">🗑️ Clear cache</button>
            <hr style="border:none; border-top:1px solid #333; margin: 10px 0;">
            <label for="setNoInput">Monitor Tube No:</label>
            <input type="text" id="setNoInput" value="205"
                style="min-width: 20px; background: #222; color: #ff9729; border: 1px solid #444; padding: 5px; border-radius: 5px; box-sizing: border-box; margin-top: 4px;">
            <div style="display: flex; gap: 5px; margin-top: 8px; align-items: center;">
                <label style="font-size: 0.8em;">From:</label>
                <input type="time" id="timeFromInput" step="1"
                    style="background: #222; color: #ff9729; border: 1px solid #444; padding: 3px; border-radius: 5px; font-family: inherit; font-size: 1em;">
                <label style="font-size: 0.8em;">To:</label>
                <input type="time" id="timeToInput" step="1"
                    style="background: #222; color: #ff9729; border: 1px solid #444; padding: 3px; border-radius: 5px; font-family: inherit; font-size: 1em;">
            </div>
            <div style="display: flex; gap: 5px; margin-top: 8px; align-items: center;">
                <label style="font-size: 0.8em;">Every (mins):</label>
                <input type="number" id="checkIntervalInput" min="1" max="60"
                    style="width: 50px; background: #222; color: #ff9729; border: 1px solid #444; padding: 3px; border-radius: 5px; font-family: inherit; font-size: 1em;">
            </div>
            <button class="cache-btn" id="alert5amBtn">🔔 5 AM Alert: OFF</button>
            <button class="cache-btn" id="test5amBtn">🧪 Test 5 AM Alert</button>
            <div id="cacheStatus"></div>
        </div>
    </div>

    <script>
        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);

                    // Listen for messages from the service worker
                    navigator.serviceWorker.addEventListener('message', event => {
                        if (event.data && event.data.type === 'SW_UPDATE_AVAILABLE') {
                            // Notify user that an update is available
                            if (confirm('A new version of the app is available. Would you like to reload now?')) {
                                window.location.reload();
                            }
                        }

                        // Handle other message types if needed
                        if (event.data && event.data.type === 'SW_UPDATE_CHECKED_ONLINE') {
                            console.log('Service worker update check completed');
                        }
                    });
                })
                .catch(err => console.warn('SW registration failed:', err));
        }

        // Send a message to the active SW using a MessageChannel for a reply
        function sendSwMessage(msg) {
            return new Promise((resolve, reject) => {
                if (!navigator.serviceWorker.controller) {
                    reject('No active service worker');
                    return;
                }
                const channel = new MessageChannel();
                channel.port1.onmessage = e => resolve(e.data);
                navigator.serviceWorker.controller.postMessage(msg, [channel.port2]);
            });
        }

        // Cache controls
        const cacheStatus = document.getElementById('cacheStatus');

        document.getElementById('recacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Caching...';
            try {
                const result = await sendSwMessage('RECACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Page cached!';
            } catch (e) {
                // Fallback if SW not yet controlling the page
                try {
                    const cache = await caches.open('stepney-green-v2');
                    await cache.add('/index');
                    await cache.add('/manifest.json');
                    await cache.add('/192-192.png');
                    await cache.add('/512-512.png');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Page cached!';
                    window.location.reload();
                } catch (err) {
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Reload page first';
                }
            }
        });

        document.getElementById('clearCacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Clearing...';
            try {
                const result = await sendSwMessage('CLEAR_CACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Cache cleared!';
            } catch (e) {
                try {
                    await caches.delete('stepney-green-v1');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Cache cleared!';
                } catch (err) {
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Failed';
                }
            }
        });

        // --- Font Size Control ---
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            const cname = name + "=";
            const ca = decodeURIComponent(document.cookie).split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(cname) === 0) return c.substring(cname.length);
            }
            return "";
        }

        const fontSlider = document.getElementById("fontSlider");
        const sliderContainer = document.getElementById("sliderContainer");
        const cogBtn = document.getElementById("cogBtn");

        fontSlider.addEventListener("input", (e) => {
            document.body.style.fontSize = e.target.value + "em";
            setCookie("fontSize", e.target.value, 30);
        });

        addEventListener("DOMContentLoaded", () => {
            let savedSize = getCookie("fontSize");
            if (savedSize) {
                document.body.style.fontSize = savedSize + "em";
                fontSlider.value = savedSize;
            } else {
                fontSlider.value = 1;
            }
        });

        cogBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = sliderContainer.style.display !== "none";
            sliderContainer.style.display = isOpen ? "none" : "block";
            if (!isOpen) cacheStatus.textContent = '';
        });

        document.addEventListener("click", (e) => {
            if (!document.getElementById("fontControls").contains(e.target)) {
                sliderContainer.style.display = "none";
            }
        });

        // --- 5 AM Automated Arrival Check ---
        let alert5amEnabled = localStorage.getItem('alert5amEnabled') === 'true';
        let monitoredSetNo = localStorage.getItem('monitoredSetNo') || '205';
        let timeFrom = localStorage.getItem('timeFrom') || '05:15:00';
        let timeTo = localStorage.getItem('timeTo') || '05:40:00';
        let checkInterval = parseInt(localStorage.getItem('checkInterval')) || 5;

        const alert5amBtn = document.getElementById('alert5amBtn');
        const setNoInput = document.getElementById('setNoInput');
        const timeFromInput = document.getElementById('timeFromInput');
        const timeToInput = document.getElementById('timeToInput');
        const checkIntervalInput = document.getElementById('checkIntervalInput');

        setNoInput.value = monitoredSetNo;
        setNoInput.addEventListener('change', (e) => {
            monitoredSetNo = e.target.value.trim();
            localStorage.setItem('monitoredSetNo', monitoredSetNo);
        });

        timeFromInput.value = timeFrom;
        timeFromInput.addEventListener('change', (e) => {
            timeFrom = e.target.value;
            localStorage.setItem('timeFrom', timeFrom);
        });

        timeToInput.value = timeTo;
        timeToInput.addEventListener('change', (e) => {
            timeTo = e.target.value;
            localStorage.setItem('timeTo', timeTo);
        });

        checkIntervalInput.value = checkInterval;
        checkIntervalInput.addEventListener('change', (e) => {
            checkInterval = parseInt(e.target.value) || 5;
            localStorage.setItem('checkInterval', checkInterval);
        });

        function updateAlert5amBtn() {
            alert5amBtn.textContent = alert5amEnabled ? '🔕 5 AM Alert: ON' : '🔔 5 AM Alert: OFF';
            alert5amBtn.style.color = alert5amEnabled ? '#0f0' : '#ff9729';
        }

        alert5amBtn.addEventListener('click', async () => {
            if (Notification.permission === 'default') {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return;
            }
            alert5amEnabled = !alert5amEnabled;
            localStorage.setItem('alert5amEnabled', alert5amEnabled);
            updateAlert5amBtn();
        });

        updateAlert5amBtn();

        document.getElementById('test5amBtn').addEventListener('click', () => {
            performArrivalCheck(true); // Force check now
        });

        function scheduleArrivalCheck() {
            const now = new Date();

            // Parse custom time window
            const [fromH, fromM, fromS] = timeFrom.split(':').map(Number);
            const [toH, toM, toS] = timeTo.split(':').map(Number);

            const startCheck = new Date();
            startCheck.setHours(fromH, fromM, fromS || 0, 0);
            // Buffer: start checking 10 mins before the "From" time to catch early updates

            const endCheck = new Date();
            endCheck.setHours(toH, toM, toS || 0, 0);

            let nextCheckTime;

            if (now < startCheck) {
                // It's before the window, wait until start
                nextCheckTime = startCheck;
            } else if (now >= startCheck && now <= endCheck) {
                // It's in the window, check in custom minutes
                nextCheckTime = new Date(now.getTime() + checkInterval * 60 * 1000);

                // If next check is past the window end, schedule for tomorrow
                if (nextCheckTime > endCheck) {
                    nextCheckTime = new Date(startCheck);
                    nextCheckTime.setDate(nextCheckTime.getDate() + 1);
                }
            } else {
                // It's after the window, schedule for tomorrow
                nextCheckTime = new Date(startCheck);
                nextCheckTime.setDate(nextCheckTime.getDate() + 1);
            }

            const delay = nextCheckTime.getTime() - now.getTime();
            console.log(`Next arrival check at ${nextCheckTime.toLocaleTimeString()} (delay: ${Math.floor(delay / 60000)} mins using interval ${checkInterval}m).`);

            setTimeout(() => {
                const inWindow = nextCheckTime >= startCheck && nextCheckTime <= endCheck;
                if (alert5amEnabled && inWindow) {
                    performArrivalCheck();
                }
                scheduleArrivalCheck(); // Recursive call
            }, delay);
        }

        async function performArrivalCheck(force = false) {
            if (!alert5amEnabled && !force) return;
            const today = new Date().toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            console.log(`Performing automated 5 AM arrival check for [${today}] for SetNo: ${monitoredSetNo}, Window: ${timeFrom} - ${timeTo}...`);
            try {
                const response = await fetch('https://api.tfl.gov.uk/trackernet/PredictionDetailed/H/STG?app_key=f6de10a6e45f4c55b9e4de791bbc60c0');
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                const xmlString = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                const data = xmlToJson(xmlDoc);

                if (!data.ROOT || !data.ROOT.S || !data.ROOT.S.P) return;

                let found = false;
                const platforms = Array.isArray(data.ROOT.S.P) ? data.ROOT.S.P : [data.ROOT.S.P];

                platforms.forEach(p => {
                    if (!p.T) return;
                    const trains = Array.isArray(p.T) ? p.T : [p.T];

                    trains.forEach(t => {
                        const attr = t['@attributes'];
                        if (attr && attr.SetNo === monitoredSetNo) {
                            const arrivalTime = attr.ArrivalTime; // Format HH:MM:SS
                            if (force || (arrivalTime >= timeFrom && arrivalTime <= timeTo)) {
                                found = true;
                                showLocalNotification(`[${today}] Tàu ${monitoredSetNo} đến lúc ${arrivalTime}`, `Platform: ${p['@attributes'].N}`);
                            }
                        }
                    });
                });

                if (!found) {
                    console.log(`SetNo ${monitoredSetNo} not found in the window [${timeFrom} - ${timeTo}] on ${today}.`);
                    showLocalNotification(force ? `Test [${today}]` : `Cảnh báo [${today}]`, `Hôm nay không có tàu ${monitoredSetNo} đến Stepney Green!`);
                }
            } catch (error) {
                console.error('Error during scheduled check:', error);
                if (force) showLocalNotification("Error", "Check console for details.");
            }
        }

        async function showLocalNotification(title, body) {
            if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') {
                console.warn("Notification not showed: Permission not granted or no SW.");
                return;
            }
            const registration = await navigator.serviceWorker.ready;
            registration.showNotification(title, {
                body: body,
                icon: '/192-192.png',
                badge: '/192-192.png',
                vibrate: [200, 100, 200],
                tag: 'arrival-alert'
            });
        }

        // Initialize scheduler
        scheduleArrivalCheck();
    </script>
</body>

</html>
