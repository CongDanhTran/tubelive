<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tube</title>
    <link rel="manifest" href="/manifest.json?name=Nearby+Tubes&short_name=Nearby&start_url=/nearby.html">
    <link rel="stylesheet" href="/css/nearby.css">
</head>

<body>
    <button id="reloadBtn">🔄 Refresh</button>
    <div id="status">Getting location...</div>
    <div id="clock"></div>
    <div id="arrivals">
        <div id="station-0" class="station-block hidden"></div>
        <div id="station-1" class="station-block hidden"></div>
        <div id="station-2" class="station-block hidden"></div>
        <div id="station-3" class="station-block hidden"></div>
        <div id="station-4" class="station-block hidden"></div>
        <div id="station-5" class="station-block hidden"></div>
        <div id="station-6" class="station-block hidden"></div>
        <div id="station-7" class="station-block hidden"></div>
        <div id="station-8" class="station-block hidden"></div>
        <div id="station-9" class="station-block hidden"></div>
    </div>


    <!-- Cog settings panel -->
    <div id="fontControls">
        <button id="cogBtn">⚙️</button>
        <div id="sliderContainer">
            <label for="fontSlider">Font Size:</label>
            <input type="range" id="fontSlider" min="0.8" max="2" step="0.1">
            <hr>
            <label for="radius">Radius (m):</label>
            <input type="number" id="radius" min="300" max="5000" step="100" value="1000">
            <hr>
            <label for="onlineTimeout">Return Timeout (s):</label>
            <input type="number" id="onlineTimeout" min="5" max="60" step="1" value="20">
            <hr>
            <label for="geoTimeout">Geo Timeout (s):</label>
            <input type="number" id="geoTimeout" min="5" max="30" step="1" value="15">
            <hr>
            <label for="locationInterval">Location Interval (s):</label>
            <input type="number" id="locationInterval" min="5" max="60" step="1" value="10">
            <hr>
            <label for="fetchInterval">Fetch Interval (s):</label>
            <input type="number" id="fetchInterval" min="10" max="120" step="1" value="20">
            <hr>
            <button class="cache-btn" id="recacheBtn">🔄 Re-cache page</button>
            <button class="cache-btn" id="clearCacheBtn">🗑️ Clear cache</button>
            <div id="cacheStatus"></div>
        </div>
    </div>
    <script src="js/nearby.js"></script>
</body>

</html>
