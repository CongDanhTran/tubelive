<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tube</title>
    <link rel="manifest" href="/manifest.json?name=Tube+Live&short_name=TubeLive&start_url=/">
    <link rel="icon" href="images/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <button id="reloadBtn" onclick="location.reload()">
        🔄
    </button>
    <div id="status"></div>

    <div>
        <span id="clock"></span>
    </div>
    <span class="station-name">Live</span>
    <div id="arrivals"></div>
    <div id="summaryArrivals"></div>
    <!-- Cog settings panel -->
    <div id="fontControls">
        <button id="cogBtn">⚙️</button>
        <div id="sliderContainer">
            <label for="fontSlider">Font Size:</label>
            <input type="range" id="fontSlider" min="0.8" max="1.5" step="0.1">
            <label for="lineHeightSlider" class="margin-top-5">Line Height:</label>
            <input type="range" id="lineHeightSlider" min="0.5" max="2" step="0.1">
            <label for="letterSpacingSlider" class="margin-top-5">Letter Spacing:</label>
            <input type="range" id="letterSpacingSlider" min="-2" max="2" step="0.1">
            <hr>
            <button class="cache-btn" id="recacheBtn">🔄 Offline mode</button>
            <button class="cache-btn" id="clearCacheBtn">🗑️ Clear offline</button>
            <div id="cacheStatus"></div>
            <hr>
            <label><a href="https://api-portal.tfl.gov.uk/" target="_blank">Trackernet Key (Real-time TFL
                    Data):</a></label>
            <input type="text" id="appKeyInput" value="" class="settings-input" style="width: 100%;">
            <hr>
            <div class="grid-layout">
                <label>Line:</label>
                <select id="lineInput" class="settings-input settings-input-center">
                </select>
                <label>Monitor Station:</label>
                <select id="stationInput" class="settings-input settings-input-center">
                </select>
            </div>
            <hr>
            <div class="flex-layout">
                <label for="setNoInput">Monitor Tube Number:</label>
                <input type="text" id="setNoInput" value="" class="settings-input">
                <label>Alert every (mins):</label>
                <input type="number" id="checkIntervalInput" min="1" max="60" class="settings-input">
            </div>
            <div class="flex-layout">
                <label>From:</label>
                <input type="time" id="timeFromInput" step="1" class="settings-input">
                <label>To:</label>
                <input type="time" id="timeToInput" step="1" class="settings-input">
            </div>
            <button class="cache-btn" id="alert5amBtn">🔕 Device Alert: OFF</button>
            <button class="cache-btn" id="test5amBtn">🧪 Test Alert</button>
            <button class="cache-btn" id="serverAlertBtn">🔕 Server Push Alert: OFF</button>
            <hr>
            <button class="cache-btn" id="summaryToggleBtn">Multi-Station: OFF</button>
            <div class="grid-layout">
                <label>Line:</label>
                <select id="summaryLineInput" class="settings-input" style="width: 100%;">
                </select>
                <label>Stations (same line):</label>
                <div class="summary-stations-wrapper">
                    <button id="summaryStationsBtn">
                        Select Stations...
                    </button>
                    <div id="summaryStationsMenu">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>

</html>
