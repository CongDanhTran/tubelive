    <script>
        function xmlToJson(xml) {
            var obj = {};
            if (xml.nodeType == 1) {
                if (xml.attributes.length > 0) {
                    obj["@attributes"] = {};
                    for (var j = 0; j < xml.attributes.length; j++) {
                        var attribute = xml.attributes.item(j);
                        obj["@attributes"][attribute.nodeName] = attribute.nodeValue;
                    }
                }
            } else if (xml.nodeType == 3) {
                obj = xml.nodeValue;
            }
            var textNodes = [].slice.call(xml.childNodes).filter(function (node) {
                return node.nodeType === 3;
            });
            if (xml.hasChildNodes() && xml.childNodes.length === textNodes.length) {
                obj = [].slice.call(xml.childNodes).reduce(function (text, node) {
                    return text + node.nodeValue;
                }, "");
            } else if (xml.hasChildNodes()) {
                for (var i = 0; i < xml.childNodes.length; i++) {
                    var item = xml.childNodes.item(i);
                    var nodeName = item.nodeName;
                    if (typeof obj[nodeName] == "undefined") {
                        obj[nodeName] = xmlToJson(item);
                    } else {
                        if (typeof obj[nodeName].push == "undefined") {
                            var old = obj[nodeName];
                            obj[nodeName] = [];
                            obj[nodeName].push(old);
                        }
                        obj[nodeName].push(xmlToJson(item));
                    }
                }
            }
            return obj;
        }

        // Converts TfL UTC HH:mm:ss to local time HH:mm:ss
        function tflTimeToLocal(utcString) {
            if (!utcString || !utcString.includes(':')) return utcString;
            const [h, m, s] = utcString.split(':').map(Number);
            const date = new Date();
            date.setUTCHours(h, m, s, 0);
            const pad = n => n.toString().padStart(2, '0');
            return `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        const params = new URLSearchParams(window.location.search);
        let monitoredStation = params.get('station') || localStorage.getItem('monitoredStation') || '';
        let monitoredLine = params.get('line') || localStorage.getItem('monitoredLine') || '';
        let monitoredAppKey = params.get('appKey') || localStorage.getItem('monitoredAppKey') || '';

        const lineNames = {
            'B': 'Bakerloo',
            'C': 'Central',
            'D': 'District',
            'H': 'Hammersmith & Circle',
            'J': 'Jubilee',
            'M': 'Metropolitan',
            'N': 'Northern',
            'P': 'Piccadilly',
            'V': 'Victoria',
            'W': 'Waterloo & City'
        };

        let URL;
        function updateUrl() {
            URL = `https://api.tfl.gov.uk/trackernet/PredictionDetailed/${monitoredLine}/${monitoredStation}?app_key=${monitoredAppKey}`;
        }
        updateUrl();

        function validateInputs() {
            if (!monitoredStation || !monitoredLine || !monitoredAppKey) {
                const arrivalsContainer = document.getElementById('arrivals');
                if (arrivalsContainer) {
                    arrivalsContainer.innerHTML = '<h2 style="color: red;">Missing Station, Line, or App Key in Settings!</h2>';
                }
                return false;
            }
            return true;
        }

        function fetchArrivals() {
            if (!validateInputs()) return;
            fetch(URL)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.text();
                })
                .then(xmlString => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                    updateArrivals(xmlToJson(xmlDoc));
                })
                .catch(error => {
                    arrivals.innerHTML = "<h2 style='color: red;'>Error fetching tube data</h2>";
                    console.error('Error fetching data:', error);
                });
        }

        function updateArrivals(data) {
            const arrivalsContainer = document.getElementById('arrivals');
            arrivalsContainer.innerHTML = '';
            const platforms = {};

            console.log(data);

            if (!data.ROOT || !data.ROOT.S || !data.ROOT.S.P || data.ROOT.S.P.filter(item0 => item0.T?.length > 0).length === 0) {
                arrivalsContainer.innerHTML = '<h2 style="color: red;">No tube</h2>';
                return;
            }

            const stationName = data.ROOT.S['@attributes'].N;

            if (stationName && stationName !== "") {
                document.querySelector('.station-name').textContent = stationName;
            }

            data.ROOT.S.P.forEach(item0 => {
                if (item0.T?.length > 0) {
                    platforms[item0['@attributes'].N] = item0.T ?? [];
                }
            });

            const sortedPlatforms = Object.keys(platforms).sort((a, b) => a - b);

            sortedPlatforms.forEach(platform => {
                const platformSection = document.createElement('div');
                platformSection.classList.add('platform-section');

                const platformHeader = document.createElement('h3');
                platformHeader.textContent = platform;
                platformSection.appendChild(platformHeader);

                platforms[platform].forEach((item1, i) => {
                    if (i > 4) return;
                    const arrivalDiv = document.createElement('div');
                    arrivalDiv.classList.add('arrival-time');
                    const item = item1['@attributes'];

                    const destination = item.Destination?.replace("Underground Station", "") || 'Destination Unknown';
                    const currentLocation = item.Location || 'Location Unknown';
                    const timeToStation = Math.floor(item.SecondsTo / 60) || 0;
                    const isEmpty = (str) => (!str?.length);
                    var expectedArrival = "Unknown";
                    if (!isEmpty(item.ArrivalTime)) {
                        expectedArrival = tflTimeToLocal(item.ArrivalTime);
                    }

                    arrivalDiv.innerHTML = `
                        <div class="departure">
                            <p class="destination"><span>${destination} (${item?.SetNo}) - ${expectedArrival}</span></p>
                            <p class="time-left"><span>${timeToStation} mins</span></p>
                        </div>
                        <div class="departure">
                            <p class="live-location">Live: <span>${currentLocation || 'N/A'}</span></p>
                        </div>
                    `;
                    platformSection.appendChild(arrivalDiv);
                });

                arrivalsContainer.appendChild(platformSection);
            });
        }

        fetchArrivals();
        setInterval(fetchArrivals, 20000);
    </script>

    <script>
        async function fetchJourneys(api, containerName) {
            const container = document.getElementById(containerName);
            try {
                const response = await fetch(api);
                const data = await response.json();
                displayJourneys(data.journeys, container);
            } catch (error) {
                console.error("Error fetching journey data:", error);
                container.innerHTML = "Failed to load journey data.";
            }
        }

        function displayJourneys(journeys, container) {
            container.innerHTML = "";
            if (!journeys || journeys.length === 0) {
                container.innerHTML = "No journeys available.";
                return;
            }
            journeys.forEach(journey => {
                const journeyDiv = document.createElement("div");
                journeyDiv.className = "journey";
                const startTime = new Date(journey.startDateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const arrivalTime = new Date(journey.arrivalDateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                journeyDiv.innerHTML = `
                    <p><strong>${startTime} - ${arrivalTime}</strong> <span class="time-left">(${journey.duration}')</span></p>
                    <div class="legs">
                        ${journey.legs.map((leg) => `
                            <p>• ${leg.instruction.summary} ${new Date(leg.departureTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} (${leg.duration}')</p>
                        `).join("")}
                    </div>
                `;
                container.appendChild(journeyDiv);
            });
        }

        const API_URL_now = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=bus,tube&walkingSpeed=fast&useRealTimeLiveArrivals=true";
        const API_URL_5AM_tube = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=tube&walkingSpeed=fast&useRealTimeLiveArrivals=true&time=0500&maxWalkingMinutes=20";
        const API_URL_5AM_Bus = "https://api.tfl.gov.uk/Journey/JourneyResults/E14AQ/to/marriotcountyhall?mode=tube,bus&walkingSpeed=fast&useRealTimeLiveArrivals=true&time=0500&maxWalkingMinutes=12";

        fetchJourneys(API_URL_5AM_tube, "journeyContainer");
        setInterval(() => fetchJourneys(API_URL_5AM_tube, "journeyContainer"), 120000);

        fetchJourneys(API_URL_5AM_Bus, "journeyContainer2");
        setInterval(() => fetchJourneys(API_URL_5AM_Bus, "journeyContainer2"), 120000);

        fetchJourneys(API_URL_now, "journeyContainer1");
        setInterval(() => fetchJourneys(API_URL_now, "journeyContainer1"), 20000);
    </script>

    <script>
        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);

                    // Listen for messages from the service worker
                    navigator.serviceWorker.addEventListener('message', event => {
                        if (event.data && event.data.type === 'SW_UPDATE_AVAILABLE') {
                            // Notify user that an update is available
                            if (confirm('A new version of the app is available. Would you like to reload now?')) {
                                window.location.reload();
                            }
                        }

                        // Handle other message types if needed
                        if (event.data && event.data.type === 'SW_UPDATE_CHECKED_ONLINE') {
                            console.log('Service worker update check completed');
                        }
                    });
                })
                .catch(err => console.warn('SW registration failed:', err));
        }

        // Send a message to the active SW using a MessageChannel for a reply
        function sendSwMessage(msg) {
            return new Promise((resolve, reject) => {
                if (!navigator.serviceWorker.controller) {
                    reject('No active service worker');
                    return;
                }
                const channel = new MessageChannel();
                channel.port1.onmessage = e => resolve(e.data);
                navigator.serviceWorker.controller.postMessage(msg, [channel.port2]);
            });
        }

        // Cache controls
        const cacheStatus = document.getElementById('cacheStatus');

        document.getElementById('recacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Caching...';
            try {
                const result = await sendSwMessage('RECACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Page cached!';
            } catch (e) {
                // Fallback if SW not yet controlling the page
                try {
                    const cache = await caches.open('stepney-green-v2');
                    await cache.add('/index');
                    await cache.add('/manifest.json');
                    await cache.add('/192-192.png');
                    await cache.add('/512-512.png');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Page cached!';
                    window.location.reload();
                } catch (err) {
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Reload page first';
                }
            }
        });

        document.getElementById('clearCacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Clearing...';
            try {
                const result = await sendSwMessage('CLEAR_CACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Cache cleared!';
            } catch (e) {
                try {
                    await caches.delete('stepney-green-v1');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Cache cleared!';
                } catch (err) {
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Failed';
                }
            }
        });

        // --- Font Size Control ---
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            const cname = name + "=";
            const ca = decodeURIComponent(document.cookie).split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(cname) === 0) return c.substring(cname.length);
            }
            return "";
        }

        const fontSlider = document.getElementById("fontSlider");
        const sliderContainer = document.getElementById("sliderContainer");
        const cogBtn = document.getElementById("cogBtn");

        fontSlider.addEventListener("input", (e) => {
            document.body.style.fontSize = e.target.value + "em";
            setCookie("fontSize", e.target.value, 30);
        });

        addEventListener("DOMContentLoaded", () => {
            // Populate line dropdowns
            const lineSelects = [document.getElementById('lineInput'), document.getElementById('summaryLineInput')];
            lineSelects.forEach(select => {
                if (!select) return;
                for (const [code, name] of Object.entries(lineNames)) {
                    const opt = document.createElement('option');
                    opt.value = code;
                    opt.textContent = name;
                    select.appendChild(opt);
                }
            });

            // Set current values
            document.getElementById('lineInput').value = monitoredLine;
            document.getElementById('summaryLineInput').value = summaryLine;

            let savedSize = getCookie("fontSize");
            if (savedSize) {
                document.body.style.fontSize = savedSize + "em";
                fontSlider.value = savedSize;
            } else {
                fontSlider.value = 1;
            }
        });

        cogBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = sliderContainer.style.display !== "none";
            sliderContainer.style.display = isOpen ? "none" : "block";
            if (!isOpen) cacheStatus.textContent = '';
        });

        document.addEventListener("click", (e) => {
            if (!document.getElementById("fontControls").contains(e.target)) {
                sliderContainer.style.display = "none";
            }
        });

        // --- Push Notification Server Integration ---
        const PUSH_SERVER_URL = ''; // Leave empty if same origin, or e.g., 'https://your-server.com'

        async function subscribeToPush() {
            if (!('serviceWorker' in navigator)) return;
            const registration = await navigator.serviceWorker.ready;

            try {
                const response = await fetch(`${PUSH_SERVER_URL}/vapid-public-key`);
                const { publicKey } = await response.json();

                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(publicKey)
                });

                await fetch(`${PUSH_SERVER_URL}/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subscription,
                        monitoredSetNo,
                        timeFrom,
                        timeTo,
                        station: monitoredStation,
                        line: monitoredLine,
                        appKey: monitoredAppKey
                    })
                });
                console.log("Server-side subscription successful.");
            } catch (err) {
                console.error("Failed to subscribe to push server:", err);
            }
        }

        async function unsubscribeFromPush() {
            if (!('serviceWorker' in navigator)) return;
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.getSubscription();

            if (subscription) {
                await subscription.unsubscribe();
                await fetch(`${PUSH_SERVER_URL}/unsubscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: subscription.endpoint })
                });
                console.log("Unsubscribed from push server.");
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        // --- 5 AM Automated Arrival Check ---
        let alert5amEnabled = localStorage.getItem('alert5amEnabled') === 'true';

        function scheduleArrivalCheck() {
            const now = new Date();

            // Parse custom time window
            const [fromH, fromM, fromS] = timeFrom.split(':').map(Number);
            const [toH, toM, toS] = timeTo.split(':').map(Number);

            const startCheck = new Date();
            startCheck.setHours(fromH, fromM, fromS || 0, 0);
            // Buffer: start checking 10 mins before the "From" time to catch early updates

            const endCheck = new Date();
            endCheck.setHours(toH, toM, toS || 0, 0);

            let nextCheckTime;

            if (now < startCheck) {
                // It's before the window, wait until start
                nextCheckTime = startCheck;
            } else if (now >= startCheck && now <= endCheck) {
                // It's in the window, check in custom minutes
                nextCheckTime = new Date(now.getTime() + checkInterval * 60 * 1000);

                // If next check is past the window end, schedule for tomorrow
                if (nextCheckTime > endCheck) {
                    nextCheckTime = new Date(startCheck);
                    nextCheckTime.setDate(nextCheckTime.getDate() + 1);
                }
            } else {
                // It's after the window, schedule for tomorrow
                nextCheckTime = new Date(startCheck);
                nextCheckTime.setDate(nextCheckTime.getDate() + 1);
            }

            const delay = nextCheckTime.getTime() - now.getTime();
            console.log(`Next arrival check at ${nextCheckTime.toLocaleTimeString()} (delay: ${Math.floor(delay / 60000)} mins using interval ${checkInterval}m).`);

            setTimeout(() => {
                const inWindow = nextCheckTime >= startCheck && nextCheckTime <= endCheck;
                if (alert5amEnabled && inWindow) {
                    performArrivalCheck();
                }
                scheduleArrivalCheck(); // Recursive call
            }, delay);
        }

        // --- Summary Fetching ---
        let summaryEnabled = localStorage.getItem('summaryEnabled') === 'true';
        let summaryLine = localStorage.getItem('summaryLine') || 'H';
        let summaryStations = localStorage.getItem('summaryStations') || 'BKG, STG, ALD';

        const summaryToggleBtn = document.getElementById('summaryToggleBtn');
        const summaryLineInput = document.getElementById('summaryLineInput');
        const summaryStationsInput = document.getElementById('summaryStationsInput');
        const summaryArrivalsContainer = document.getElementById('summaryArrivals');

        function updateSummaryButtons() {
            summaryToggleBtn.textContent = summaryEnabled ? '🔔 Summary: ON' : '🔕 Summary: OFF';
            summaryToggleBtn.style.color = summaryEnabled ? '#0f0' : '#ff9729';
            summaryArrivalsContainer.style.display = summaryEnabled ? 'grid' : 'none';
        }

        summaryToggleBtn.addEventListener('click', () => {
            summaryEnabled = !summaryEnabled;
            localStorage.setItem('summaryEnabled', summaryEnabled);
            updateSummaryButtons();
            if (summaryEnabled) fetchSummaryArrivals();
        });

        summaryLineInput.value = summaryLine;
        summaryLineInput.addEventListener('change', (e) => {
            summaryLine = e.target.value.trim().toUpperCase();
            localStorage.setItem('summaryLine', summaryLine);
            if (summaryEnabled) fetchSummaryArrivals();
        });

        summaryStationsInput.value = summaryStations;
        summaryStationsInput.addEventListener('change', (e) => {
            summaryStations = e.target.value.trim().toUpperCase();
            localStorage.setItem('summaryStations', summaryStations);
            if (summaryEnabled) fetchSummaryArrivals();
        });

        function fetchSummaryArrivals() {
            if (!summaryEnabled) return;
            const url = `https://api.tfl.gov.uk/TrackerNet/PredictionSummary/${summaryLine}?app_key=${monitoredAppKey}`;
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.text();
                })
                .then(xmlString => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                    const json = xmlToJson(xmlDoc);
                    const stationsToFind = summaryStations.split(',').map(s => s.trim());

                    summaryArrivalsContainer.innerHTML = '';
                    if (json.ROOT && json.ROOT.S) {
                        const stations = Array.isArray(json.ROOT.S) ? json.ROOT.S : [json.ROOT.S];
                        stations.forEach(station => {
                            if (stationsToFind.includes(station['@attributes']?.Code)) {
                                renderSummaryStation(station, station['@attributes']?.N);
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('Error fetching summary data:', error);
                });
        }

        function renderSummaryStation(stationData, stationName) {
            const platforms = {};
            if (!stationData.P) return;
            const platformNodes = Array.isArray(stationData.P) ? stationData.P : [stationData.P];

            platformNodes.forEach(p => {
                const trains = p.T ? (Array.isArray(p.T) ? p.T : [p.T]) : [];
                if (trains.length > 0) {
                    platforms[p['@attributes']?.N] = trains;
                }
            });

            const sortedPlatforms = Object.keys(platforms).sort();

            sortedPlatforms.forEach(platform => {
                const platformSection = document.createElement('div');
                platformSection.classList.add('platform-section');

                const platformHeader = document.createElement('h3');
                platformHeader.textContent = `${platform} - ${stationName}`;
                platformSection.appendChild(platformHeader);

                platforms[platform].slice(0, 3).forEach(train => {
                    const item = train['@attributes'];
                    const arrivalDiv = document.createElement('div');
                    arrivalDiv.classList.add('arrival-time');

                    const destination = item.DE?.replace("Underground Station", "") || 'Unknown';
                    const currentLocation = item.L || 'N/A';
                    const timeToStation = Math.floor(item.ST / 60) || 0;

                    let expectedArrival = "Now";
                    if (item.DT && item.DT !== "") {
                        // PredictionSummary uses DT which might be already adjusted or UTC.
                        // Based on all.html logic, it adds 1 hour? Wait, all.html logic:
                        // let [h, m, s] = item.DT.split(":").map(Number);
                        // date.setHours(date.getHours() + 1);
                        // This seems specific to a timezone (GMT to BST).
                        // I'll stick to displaying it as is or attempting the same logic.
                        expectedArrival = item.DT;
                    }

                    arrivalDiv.innerHTML = `
                        <div class="departure">
                            <p class="destination"><span>${destination} (${item?.S}) - ${expectedArrival}</span></p>
                            <p class="time-left"><span>${timeToStation} mins</span></p>
                        </div>
                        <div class="departure">
                            <p class="live-location">Live: <span>${currentLocation || 'N/A'}</span></p>
                        </div>
                    `;
                    platformSection.appendChild(arrivalDiv);
                });
                summaryArrivalsContainer.appendChild(platformSection);
            });
        }

        updateSummaryButtons();
        if (summaryEnabled) fetchSummaryArrivals();
        setInterval(fetchSummaryArrivals, 30000);

        // Check right away when tab is refocused or app first opens
        function instantCheckIfInWindow() {
            if (navigator.onLine) {
                const now = new Date();
                const [fromH, fromM, fromS] = timeFrom.split(':').map(Number);
                const [toH, toM, toS] = timeTo.split(':').map(Number);

                const winStart = new Date();
                winStart.setHours(fromH, fromM, fromS || 0, 0);

                const winEnd = new Date();
                winEnd.setHours(toH, toM, toS || 0, 0);

                // If currently in the monitoring period, trigger a check now
                if (now >= winStart && now <= winEnd && alert5amEnabled) {
                    console.log("Triggering instant check (App Load or Tab Refocused).");
                    performArrivalCheck();
                }
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') instantCheckIfInWindow();
        });

        // Initial check on page load
        instantCheckIfInWindow();

        async function performArrivalCheck(force = false) {
            if (!alert5amEnabled && !force) return;
            if (!validateInputs()) return;
            const today = new Date().toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
            console.log(`Performing automated 5 AM arrival check for [${today}] for SetNo: ${monitoredSetNo}, Window: ${timeFrom} - ${timeTo}...`);
            try {
                const response = await fetch(URL);
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                const xmlString = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                const data = xmlToJson(xmlDoc);

                if (!data.ROOT || !data.ROOT.S || !data.ROOT.S.P) return;

                let found = false;
                const platforms = Array.isArray(data.ROOT.S.P) ? data.ROOT.S.P : [data.ROOT.S.P];

                const stationName = data.ROOT.S['@attributes'].N;

                platforms.forEach(p => {
                    if (!p.T) return;
                    const trains = Array.isArray(p.T) ? p.T : [p.T];

                    trains.forEach(t => {
                        const attr = t['@attributes'];
                        if (attr && attr.SetNo === monitoredSetNo) {
                            const localArrivalTime = tflTimeToLocal(attr.ArrivalTime);
                            if (force || (localArrivalTime >= timeFrom && localArrivalTime <= timeTo)) {
                                found = true;
                                const lineName = lineNames[monitoredLine] || monitoredLine;
                                showLocalNotification(`[${today}] ${stationName} - ${lineName} ${monitoredSetNo} to ${attr.Destination} - ${localArrivalTime}`);
                            }
                        }
                    });
                });

                if (!found) {
                    console.log(`SetNo ${monitoredSetNo} not found in the window [${timeFrom} - ${timeTo}] on ${today}.`);
                    showLocalNotification(force ? `Test [${today}]` : `Alert [${today}]`, `No train line ${lineNames[monitoredLine]} ${monitoredSetNo} to ${stationName}!`);
                }
            } catch (error) {
                console.error('Error during scheduled check:', error);
                if (force) showLocalNotification("Error", "Check console for details.");
            }
        }

        async function showLocalNotification(title, body) {
            if (!('serviceWorker' in navigator) || Notification.permission !== 'granted') {
                console.warn("Notification not showed: Permission not granted or no SW.");
                return;
            }
            const registration = await navigator.serviceWorker.ready;
            registration.showNotification(title, {
                body: body,
                icon: '/192-192.png',
                badge: '/192-192.png',
                vibrate: [200, 100, 200],
                tag: 'arrival-alert'
            });
        }

        // Initialize scheduler
        scheduleArrivalCheck();
    </script>
