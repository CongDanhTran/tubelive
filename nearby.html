<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tube</title>
    <link rel="manifest" href="manifest_1.json">

    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #ff9729;
            margin: 0;
            font-size: 1.2em;
        }

        #clock {
            position: fixed;
            top: 5px;
            right: 10px;
            color: red;
            font-weight: bold;
        }

        .station-block {
            border-bottom: 2px solid #222;
            padding: 15px;
        }

        .station-name {
            font-weight: bold;
            font-size: 1.3em;
            color: #fff;
            margin-bottom: 10px;
        }

        .platforms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 10px;
        }

        .platform-section {
            background: #111;
            padding: 10px;
            border-radius: 8px;
        }

        h3 {
            margin: 0;
            color: #fff;
        }

        .arrival-time {
            border-bottom: 1px solid #444;
            margin: 5px 0;
            font-size: 0.9em;
        }

        .departure {
            display: flex;
            justify-content: space-between;
        }

        .time-left {
            color: red;
        }

        .live-location {
            color: #0f0;
            font-size: 0.85em;
        }
    </style>
</head>

<body>
    <button id="reloadBtn">🔄 Refresh</button>
    <div style="color: red; font-weight: bold; text-align: center;" id="status"></div>
    <div id="clock"></div>
    <div id="arrivals">Getting location...</div>


    <!-- Cog settings panel -->
    <div id="fontControls" style="position: fixed; bottom: 10px; right: 10px; z-index: 9999;">
        <button id="cogBtn"
            style="background:none; border:none; color:white; font-size:1.5em; cursor:pointer;">⚙️</button>
        <div id="sliderContainer"
            style="display:none; background:#111; padding:10px; border-radius:8px; margin-top:5px; color:white; font-size:0.4em; min-width: 200px;">
            <label for="fontSlider">Font Size:</label>
            <input type="range" id="fontSlider" min="0.8" max="6" step="0.1">
            <hr style="border:none; border-top:1px solid #333; margin: 10px 0;">
            <button class="cache-btn" id="recacheBtn">🔄 Re-cache page</button>
            <button class="cache-btn" id="clearCacheBtn">🗑️ Clear cache</button>
            <div id="cacheStatus"></div>
        </div>
    </div>

    <script>
        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);

                    // Listen for messages from the service worker
                    navigator.serviceWorker.addEventListener('message', event => {
                        if (event.data && event.data.type === 'SW_UPDATE_AVAILABLE') {
                            // Notify user that an update is available
                            if (confirm('A new version of the app is available. Would you like to reload now?')) {
                                window.location.reload();
                            }
                        }

                        // Handle other message types if needed
                        if (event.data && event.data.type === 'SW_UPDATE_CHECKED_ONLINE') {
                            console.log('Service worker update check completed');
                        }
                    });
                })
                .catch(err => console.warn('SW registration failed:', err));
        }

        // Send a message to the active SW using a MessageChannel for a reply
        function sendSwMessage(msg) {
            return new Promise((resolve, reject) => {
                if (!navigator.serviceWorker.controller) {
                    reject('No active service worker');
                    return;
                }
                const channel = new MessageChannel();
                channel.port1.onmessage = e => resolve(e.data);
                navigator.serviceWorker.controller.postMessage(msg, [channel.port2]);
            });
        }

        // Cache controls
        const cacheStatus = document.getElementById('cacheStatus');

        document.getElementById('recacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Caching...';
            try {
                const result = await sendSwMessage('RECACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Page cached!';
            } catch (e) {
                // Fallback if SW not yet controlling the page
                try {
                    const cache = await caches.open('stepney-green-v3');
                    await cache.add('/nearby');
                    await cache.add('/manifest_1.json');
                    await cache.add('/192-192.png');
                    await cache.add('/512-512.png');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Page cached!';
                    window.location.reload();
                } catch (err) {
                    alert(err);
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Reload page first';
                }
            }
        });

        document.getElementById('clearCacheBtn').addEventListener('click', async () => {
            cacheStatus.style.color = '#ff9729';
            cacheStatus.textContent = 'Clearing...';
            try {
                const result = await sendSwMessage('CLEAR_CACHE');
                cacheStatus.style.color = '#0f0';
                cacheStatus.textContent = '✓ Cache cleared!';
            } catch (e) {
                try {
                    await caches.delete('stepney-green-v1');
                    cacheStatus.style.color = '#0f0';
                    cacheStatus.textContent = '✓ Cache cleared!';
                } catch (err) {
                    cacheStatus.style.color = 'red';
                    cacheStatus.textContent = '✗ Failed';
                }
            }
        });

        // --- Font Size Control ---
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            const cname = name + "=";
            const ca = decodeURIComponent(document.cookie).split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(cname) === 0) return c.substring(cname.length);
            }
            return "";
        }

        const fontSlider = document.getElementById("fontSlider");
        const sliderContainer = document.getElementById("sliderContainer");
        const cogBtn = document.getElementById("cogBtn");
        const container = document.getElementById("arrivals");
        const status = document.getElementById("status");

        fontSlider.addEventListener("input", (e) => {
            document.body.style.fontSize = e.target.value + "em";
            setCookie("fontSize", e.target.value, 30);
        });

        addEventListener("DOMContentLoaded", () => {
            let savedSize = getCookie("fontSize");
            if (savedSize) {
                document.body.style.fontSize = savedSize + "em";
                fontSlider.value = savedSize;
            } else {
                fontSlider.value = 1;
            }
        });

        cogBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = sliderContainer.style.display !== "none";
            sliderContainer.style.display = isOpen ? "none" : "block";
            if (!isOpen) cacheStatus.textContent = '';
        });

        document.addEventListener("click", (e) => {
            if (!document.getElementById("fontControls").contains(e.target)) {
                sliderContainer.style.display = "none";
            }
        });

        // Reload button functionality
        document.getElementById('reloadBtn').addEventListener('click', () => {
            window.location.reload();
        });
    </script>

    <script>
        setInterval(() => {
            document.getElementById("clock").textContent =
                new Date().toLocaleTimeString();
        }, 1000);

        // Map TfL arrivals to platform dictionary
        function mapTfl(arrivals) {
            if (arrivals.length === 0) return;
            const platformsMap = {};

            arrivals.forEach(a => {
                const platform = a.platformName || "Unknown";

                if (!platformsMap[platform]) {
                    platformsMap[platform] = [];
                }

                platformsMap[platform].push({
                    "@attributes": {
                        Destination: a.destinationName || "Unknown",
                        Location: a.currentLocation || "",
                        ArrivalTime: new Date(a.expectedArrival).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) || "Unknown",
                        SecondsTo: a.timeToStation || 0
                    }
                });
            });

            Object.values(platformsMap).forEach(arr =>
                arr.sort((a, b) =>
                    a["@attributes"].SecondsTo - b["@attributes"].SecondsTo
                )
            );

            return platformsMap;
        }

        // Render ONE station
        function renderStation(stationName, distance, platforms) {

            const stationDiv = document.createElement("div");
            stationDiv.className = "station-block";

            stationDiv.innerHTML = `
                <div class="station-name">
                    ${stationName} (${Math.round(distance)}m)
                </div>
            `;

            const platformsDiv = document.createElement("div");
            platformsDiv.className = "platforms";

            Object.entries(platforms).forEach(([platform, arrivals]) => {
                const platformDiv = document.createElement("div");
                platformDiv.className = "platform-section";

                platformDiv.innerHTML = `<h3>${platform}</h3>`;

                arrivals.slice(0, 4).forEach(a => {
                    const item = a["@attributes"];
                    const minutes = Math.floor(item.SecondsTo / 60);
                    const destination = item.Destination?.replace("Underground Station", "") || 'Destination Unknown';

                    const div = document.createElement("div");
                    div.className = "arrival-time";


                    div.innerHTML = `
                    <div class="departure">
                        <span>${destination} - ${item.ArrivalTime}</span>
                        <span class="time-left">${minutes} min</span>
                    </div>
                    <div class="live-location">
                        ${item.Location || ''}
                    </div>
                `;

                    platformDiv.appendChild(div);
                });

                platformsDiv.appendChild(platformDiv);
            });

            stationDiv.appendChild(platformsDiv);
            container.appendChild(stationDiv);
        }

        let pos = null;
        let leaveTime = null;

        // Handle page hide/show and visibility change
        function handleHide() {
            leaveTime = Date.now();
        }

        async function handleShow() {
            if (leaveTime !== null && (Date.now() - leaveTime) > 300000) {
                pos = null;
                locationInterval = null;
                await fetchArrivals();
            }
            leaveTime = null;
            console.log("handleShow");
            console.log(pos);
            console.log(leaveTime);
        }

        document.addEventListener('pagehide', handleHide);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                handleHide();
            } else {
                handleShow();
            }
        });

        let locationInterval;

        // Fetch + render multiple stations
        async function fetchArrivals() {
            try {
                if (!navigator.onLine) {
                    status.textContent = "No internet connection";
                    return;
                }
                if (!pos || !pos?.coords || pos?.coords?.latitude === 0 || pos?.coords?.longitude === 0) {
                    pos = await new Promise((res, rej) =>
                        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 19000 })
                    );
                }
                if (!locationInterval) {
                    locationInterval = setInterval(await fetchLocation, 10000);
                }

                const { latitude, longitude } = pos.coords;

                const stopsRes = await fetch(
                    `https://api.tfl.gov.uk/StopPoint?lat=${latitude}&lon=${longitude}&stopTypes=NaptanMetroStation&radius=1000`
                );
                const stopsData = await stopsRes.json();

                const stations = (stopsData.stopPoints || [])
                    .sort((a, b) => a.distance - b.distance)
                    .slice(0, 5); // limit to 5 stations

                container.innerHTML = "";

                if (!navigator.onLine) {
                    status.textContent = "No internet connection";
                    return;
                }

                for (const station of stations) {
                    if (!navigator.onLine) {
                        status.textContent = "No internet connection";
                        return;
                    }
                    const arrivalsRes = await fetch(
                        `https://api.tfl.gov.uk/StopPoint/${station.id}/Arrivals`
                    );
                    const arrivals = await arrivalsRes.json();

                    if (!arrivals.length) {
                        console.log("No arrivals for station: " + station.commonName);
                        container.innerHTML = "No arrivals for station: " + station.commonName;
                        return;
                    }

                    const platforms = mapTfl(arrivals);

                    if (platforms === undefined) {
                        console.log("No arrivals for station: " + station.commonName);
                        container.innerHTML = "No arrivals for station: " + station.commonName;
                        return;
                    }

                    status.textContent = "";

                    renderStation(
                        station.commonName,
                        station.distance,
                        platforms
                    );
                }

            } catch (err) {
                //location.reload();
                status.textContent = "Cannot get location ";
                console.error(err);
            }
        }

        fetchArrivals();
        setInterval(fetchArrivals, 20000);

        async function fetchLocation() {
            try {
                const newPos = await new Promise((res, rej) =>
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 15000 })
                )
                pos = newPos;
                console.log("Location fetched at " + new Date().toLocaleTimeString());
            } catch (err) {
                console.error(err);
            }
        }
    </script>

</body>

</html>
